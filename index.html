<!DOCTYPE html>
<meta charset="utf-8">
<title>io.net CSA Generator</title>
<style>
  :root{
    --ink:#111127; --headerbg:#3b0764; --label:#5b21b6; --accent:#7c3aed;
    --lightrow:#f5f3ff; --stat:#c4b5fd; --footer:#666666; --border:#e9d5ff;
    --bg:#0f0f17; --panel:#1a1a26; --panel2:#222232; --line:#33334a; --txt:#e8e8f0; --muted:#9a9ab0;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--txt);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .brand{display:flex;align-items:center;color:#fff}
  .brand .brandlogo{height:24px;width:auto;display:block}
  .topbar h1{font-size:15px;font-weight:normal;color:var(--muted);margin:0}
  .actions{display:flex;gap:10px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-weight:bold}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#6d28d9}
  .btn-ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent)}
  .layout{display:grid;grid-template-columns:minmax(420px,520px) 1fr;gap:0;height:calc(100vh - 57px)}
  @media(max-width:980px){.layout{grid-template-columns:1fr;height:auto}}
  .formpane{overflow-y:auto;padding:18px 20px 80px;border-right:1px solid var(--line)}
  .previewpane{overflow-y:auto;background:#3a3a48;padding:28px}
  .acc{background:var(--panel);border:1px solid var(--line);border-radius:9px;margin-bottom:12px;overflow:hidden}
  .acc-head{padding:13px 15px;font-weight:bold;font-size:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;color:#fff}
  .acc-head .num{color:var(--stat);margin-right:8px}
  .acc-head .chev{color:var(--muted);transition:transform .15s}
  .acc.collapsed .acc-body{display:none}
  .acc.collapsed .chev{transform:rotate(-90deg)}
  .acc-body{padding:4px 15px 16px;border-top:1px solid var(--line)}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px;font-weight:bold;letter-spacing:.02em}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:9px 10px;font-family:inherit;font-size:13px}
  textarea{resize:vertical;line-height:1.45}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
  .radiorow{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .radiorow label{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer}
  .radiorow input{accent-color:var(--accent)}
  .speclist{margin-top:8px}
  .specrow{display:grid;grid-template-columns:150px 1fr 30px;gap:8px;margin-bottom:7px}
  .specrow input{font-size:12px}
  .specrow .rm{background:#3a2a3a;border:1px solid var(--line);color:#e0a0c0;border-radius:6px;padding:0;font-size:16px;line-height:1}
  .addrow{background:var(--panel2);border:1px dashed var(--accent);color:var(--stat);width:100%;margin-top:4px;padding:8px;border-radius:6px;font-size:12px}
  .prio{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px}
  .prio .pl{font-size:12px;font-weight:bold;color:var(--stat)}
  .prio input{font-size:12px}
  .prioHdr{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;font-size:11px;color:var(--muted);margin:6px 0}
  .flag{background:#2a2030;border:1px solid #5b3a6b;border-radius:7px;padding:10px 12px;font-size:12px;color:#d9c2e8;margin:10px 0;line-height:1.5}
  .ro{background:#15151f;border:1px solid var(--line);border-radius:6px;color:var(--muted);padding:9px 10px;font-size:13px}
  .ro b{color:var(--txt)}
  .adminbadge{background:#b45309;color:#fff;font-size:11px;font-weight:bold;padding:4px 9px;border-radius:6px;letter-spacing:.04em}
  .acc.admin{border-color:#b45309}
  .acc.admin .acc-head{background:#3a2a12}
  .acc.admin .acc-head .num{color:#fbbf24}
  .calc{background:#10160f;border:1px solid #2c4a2c;border-radius:8px;padding:12px;margin-top:10px}
  .calc .row{display:flex;justify-content:space-between;gap:12px;font-size:13px;margin:5px 0;color:var(--muted)}
  .calc .row .v{font-weight:bold;font-variant-numeric:tabular-nums}
  .calc .pos .v{color:#4ade80}
  .calc .neg .v{color:#f87171}
  .calc .big{font-size:15px;border-top:1px solid #2c4a2c;padding-top:7px;margin-top:7px;color:var(--txt)}
  .btn-send{background:#16a34a;color:#fff}
  .btn-send:hover{background:#15803d}
  .calc .mini{background:var(--panel2);border:1px solid var(--line);color:var(--stat);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:bold;margin-left:6px;vertical-align:middle}
  .calc .mini:hover{border-color:var(--accent)}
  .readystrip{border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:14px;font-size:12px;background:var(--panel)}
  .readystrip h4{margin:0;font-size:13px;color:#fff}
  .readystrip.ok{border-color:#2c4a2c}
  .readystrip.warn{border-color:#b45309}
  .readystrip.err{border-color:#b91c1c}
  .readystrip ul{margin:6px 0 0;padding-left:18px}
  .readystrip li{margin:3px 0;line-height:1.4}
  .readystrip .rsub{margin-top:8px;color:var(--muted)}
  .readystrip .err-i{color:#f87171}
  .readystrip .warn-i{color:#fbbf24}
  .readystrip .ns-i{color:#c4b5fd}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);max-width:560px;background:var(--panel);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 10px 34px rgba(0,0,0,.55);z-index:100;font-size:13px;color:var(--txt)}
  .toast.hidden{display:none}
  .toast button{padding:7px 12px;font-size:12px}
  @media print{.topbar,.toast{display:none!important}}

  /* ===== Document preview / export styling ===== */
  .docwrap{background:#fff;color:#111127;max-width:8.5in;margin:0 auto;padding:0.85in 0.85in 0.7in;box-shadow:0 6px 30px rgba(0,0,0,.4);font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.5}
  /* running header: a table thead repeats on every printed page (and reserves its
     space, so no overlap). On screen it renders once as the cover letterhead. */
  .pframe{width:100%;border-collapse:collapse}
  .pframe > thead{display:table-header-group}
  .pframe > thead td,.pframe > tbody td{padding:0;border:none;vertical-align:top}
  /* quirks mode does not inherit color into table cells; set the document ink
     explicitly on the content cell so contract text is not the light UI color */
  .pframe > tbody > tr > td{color:#111127}
  .rhead img{height:30px;width:auto;display:block}
  .rhead hr{border:none;border-bottom:2px solid #7c3aed;margin:6px 0 18px}
  .docwrap h1.doctitle{font-size:21px;color:#111127;margin:0 0 2px}
  .docwrap .subtitle{color:#5b21b6;font-weight:bold;font-size:13px;margin:0 0 18px}
  .docwrap h2.sec{font-size:14px;color:#111127;border-bottom:2px solid #7c3aed;padding-bottom:4px;margin:24px 0 10px}
  .docwrap .banner{background:#5b21b6;color:#fff;font-weight:bold;padding:7px 10px;font-size:12px;margin:18px 0 0}
  table.io{border-collapse:collapse;width:100%;margin:0 0 6px;font-size:10.5pt}
  table.io td{border:1px solid #e9d5ff;padding:7px 9px;vertical-align:top}
  table.io td.lab{background:#f5f3ff;color:#5b21b6;font-weight:bold;width:32%}
  table.io .hdr td{background:#3b0764;color:#fff;font-weight:bold}
  table.io .hdr td .sub{display:block;font-weight:normal;color:#c4b5fd;font-size:9pt}
  .sig td{border:1px solid #e9d5ff;padding:9px;vertical-align:top}
  .sig td.k{background:#f5f3ff;color:#5b21b6;font-weight:bold;width:18%}
  .sig td.party{background:#3b0764;color:#fff;font-weight:bold;text-align:center}
  .docfooter{margin-top:14px;color:#666666;font-size:9pt;border-top:1px solid #e9d5ff;padding-top:6px}
  .ack{font-size:10.5pt;margin:16px 0}
  /* legal body numbering via counters */
  .terms{counter-reset:sec}
  .terms .legalsec{counter-reset:cl;margin-top:18px}
  .terms .legalsec > h3{font-size:13px;color:#111127;border-bottom:2px solid #7c3aed;padding-bottom:3px;margin:0 0 8px}
  .terms .legalsec > h3::before{counter-increment:sec;content:counter(sec) ". "}
  .terms .cl{margin:8px 0;font-size:10.5pt}
  .terms .cl > .clt{font-weight:bold}
  .terms .cl > .clt::before{counter-increment:cl;content:counter(sec) "." counter(cl) "  ";font-weight:bold}
  .terms .cl.nonum > .clt::before{content:""}
  .terms ol.alpha{margin:6px 0 6px 18px;padding-left:14px}
  .terms ol.alpha>li{margin:4px 0;font-size:10.5pt}
  .terms ul.dash{margin:6px 0 6px 18px;padding-left:14px}
  .terms ul.dash>li{margin:3px 0;font-size:10.5pt}
  .terms p.sub{margin:5px 0 5px 18px;font-size:10.5pt}
  .pagebreak{page-break-before:always}
  .exhibit h2{font-size:15px;color:#111127;border-bottom:2px solid #7c3aed;padding-bottom:4px}
  @media print{
    body{background:#fff}
    .topbar,.formpane,.previewpane{all:unset}
    .topbar,.formpane{display:none!important}
    .layout{display:block}
    .previewpane{display:block;background:#fff;padding:0}
    .docwrap{box-shadow:none;max-width:none;margin:0;padding:0}
    /* smaller running header for the printed page; thead repeats it on every page */
    .rhead img{height:17px}
    .rhead hr{border-bottom-width:1.5px;margin:5px 0 14px}
    @page{size:8.5in 11in;margin:1in}
  }
</style>

  useLimit:BILLING_HOURS+" hours per month per machine",

  nodeCount:"64",

  slaTier:"standard",
  availTarget:"99.5",
  creditCap:"20",

  prios:{
    p1:{resp:"30 minutes",reso:"4 hours"},

  effDate:"Date of last Cover Page signature",

  courts:"The state and federal courts located in Delaware",
  courtsNonPay:"For disputes arising from non-payment or delayed payment by Customer, Provider may initiate proceedings either in the Chosen Courts or in the courts of the jurisdiction where Customer is incorporated or registered",

/* Canonical Key-Term baseline, captured from the defaults at load time. Any
   deviation is flagged as a non-standard term for legal review. Captured before
   any draft restore so it always reflects the approved standard. */
const LEGAL_LABELS = {
  govLaw:"Governing Law", courts:"Chosen Courts", courtsNonPay:"Chosen Courts (Non-Payment)",
  provClaims:"Provider Covered Claims", custClaims:"Customer Covered Claims", security:"Security statement",
  genCap:"General Cap Amount", incCap:"Increased Cap Amount", unlimited:"Unlimited Claims",
  increased:"Increased Claims", publicity:"Publicity Rights"
};
const STANDARD = {}; Object.keys(LEGAL_LABELS).forEach(k=>{ STANDARD[k]=state[k]; });

/* ---------- form builder ---------- */
function field(label,key,type="text",hint=""){
  const v = state[key]??"";
  const el = type==="textarea"
    ? `<textarea rows="3" oninput="set('${key}',this.value)">${esc(v)}</textarea>`
    : `<input type="${type}" value="${esc(v)}" oninput="set('${key}',this.value)">`;
  return `<label class="fl">${label}</label>${el}${hint?`<div class="hint">${hint}</div>`:""}`;
}
function acc(num,title,bodyHtml,collapsed=false){
  return `<div class="acc ${collapsed?'collapsed':''}">
    <div class="acc-head" onclick="this.parentNode.classList.toggle('collapsed')">
      <span><span class="num">${num}</span>${title}</span><span class="chev">▾</span></div>
    <div class="acc-body">${bodyHtml}</div></div>`;
}
function buildForm(){
  const fp = document.getElementById('formpane');

  h += acc("A","Document &amp; Parties",

  h += acc("B","Proof of Concept (POC)",

    `<label class="fl">Payment Terms</label>

       <option value="net30" ${state.payTerms==='net30'?'selected':''}>Net 30</option>
     </select>
     <div class="hint">Updates the Payment Period clause on the cover page automatically.</div>
     <label class="fl">Billing cycle (fixed)</label>

  );

  h += acc("F","Service Levels (SLA)",
    `<label class="fl">SLA tier</label>
     <select onchange="setSlaTier(this.value)">

     </select>
     <div class="hint">Sets the availability target and updates the Uptime &amp; Credits text on the cover page.</div>

  h += acc("G","Legal / Key Terms",

    field("Chosen Courts","courts")+
    field("Chosen Courts (Non-Payment Claims)","courtsNonPay","textarea")+
    field("Provider Covered Claims","provClaims","textarea")+
    field("Customer Covered Claims","custClaims","textarea")+
    `<label class="fl">Publicity rights (logo / customer name use)</label>
     <div class="radiorow">
       <label><input type="radio" name="pub" ${state.publicity==='yes'?'checked':''} onchange="set('publicity','yes')">Allowed</label>
       <label><input type="radio" name="pub" ${state.publicity==='no'?'checked':''} onchange="set('publicity','no')">Not allowed</label>

    field("General Cap Amount","genCap","textarea")+

  );

  /* Internal-only margin/profit section - generated ONLY in Admin Mode so the

  if(ADMIN){
    h += `<div class="acc admin">
      <div class="acc-head" onclick="this.parentNode.classList.toggle('collapsed')">
        <span><span class="num">$</span>Margin &amp; Profit <span style="font-weight:normal;color:var(--muted)">(internal only)</span></span><span class="chev">&#9662;</span></div>
      <div class="acc-body">
        <div class="flag">Internal-only. These values never appear in the document, the .doc export, the saved public draft, or the Send-for-Signature payload.</div>
        <div class="row2">
          <div><label class="fl">Sale price / GPU-hour ($)</label>
            <input id="saleInput" type="number" step="0.01" min="0" value="${esc(adminState.salePrice)}" oninput="setAdmin('salePrice',this.value)"></div>
          <div><label class="fl">Hourly cost / GPU ($)</label>
            <input id="costInput" type="number" step="0.01" min="0" value="${esc(adminState.costPerGpu)}" oninput="setAdmin('costPerGpu',this.value)"></div>
        </div>
        <div class="row2">
          <div><label class="fl">Min margin floor (%)</label>
            <input id="floorInput" type="number" step="1" min="0" max="100" value="${esc(adminState.floor)}" oninput="setAdmin('floor',this.value)"></div>
          <div><label class="fl">Target margin (%)</label>
            <input id="targetInput" type="number" step="1" min="0" max="100" value="${esc(adminState.targetMargin)}" oninput="setAdmin('targetMargin',this.value)"></div>
        </div>
        <div class="hint">Picking a hardware preset auto-fills the cost from the cost library (placeholder estimates - replace with your actuals). Below-floor deals are blocked on Send.</div>
        <div id="adminCalc"></div>
      </div></div>`;
  }

  fp.innerHTML = h;
  renderSpecs();
  updateReadiness();
  if(ADMIN) updateAdminCalc();
}
function renderSpecs(){
  const c = document.getElementById('speclist'); if(!c) return;
  c.innerHTML = state.specRows.map((r,i)=>`
    <div class="specrow">
      <input type="text" value="${esc(r.label)}" oninput="setSpec(${i},'label',this.value)" placeholder="Label">
      <input type="text" value="${esc(r.value)}" oninput="setSpec(${i},'value',this.value)" placeholder="Value">
      <button class="rm" onclick="rmSpec(${i})" title="Remove">x</button>
    </div>`).join("");
}

/* ---------- state setters (public state -> autosaved) ---------- */
function set(k,v){ state[k]=v; render(); saveDraft(); }
function setPrio(p,f,v){ state.prios[p][f]=v; render(); saveDraft(); }
function setSpec(i,f,v){ state.specRows[i][f]=v; render(); saveDraft(); }
function rmSpec(i){ state.specRows.splice(i,1); renderSpecs(); render(); saveDraft(); }
function addSpec(){ state.specRows.push({label:"",value:""}); renderSpecs(); render(); saveDraft(); }
function applyPreset(name){
  if(!name||!PRESETS[name])return;
  state.specRows = PRESETS[name].map(r=>({label:r[0],value:r[1]}));
  if(ADMIN && COST_DEFAULTS[name]!=null){           // cost library auto-fill
    adminState.costPerGpu = String(COST_DEFAULTS[name]); saveAdmin();
    const ci=document.getElementById('costInput'); if(ci) ci.value=adminState.costPerGpu;
  }
  renderSpecs(); render(); saveDraft();
  if(ADMIN) updateAdminCalc();
}
function setNodes(v){ state.nodeCount=v; const el=document.getElementById('totalGpus'); if(el) el.innerHTML=totalGpusLabel(); render(); if(ADMIN) updateAdminCalc(); saveDraft(); }
function setSlaTier(v){ state.slaTier=v; state.availTarget=slaAvail(v); render(); saveDraft(); }
function setPayTerms(v){ state.payTerms=v; render(); saveDraft(); }
/* admin setter: confidential, never touches public state, render, or public draft */
function setAdmin(k,v){ adminState[k]=v; updateAdminCalc(); saveAdmin(); }

/* ============ CALCULATION ENGINE ============ */
function num(v){ const n=parseFloat(v); return isNaN(n)?null:n; }
function totalGpus(){ return (parseInt(state.nodeCount,10)||0)*GPUS_PER_NODE; }
function totalGpusLabel(){ const g=totalGpus(); return g? `<b>${g.toLocaleString()}</b> GPUs` : '&mdash;'; }
function slaAvail(tier){ return tier==='premium' ? '99.9' : '99.5'; }
function slaTierLabel(tier){ return tier==='premium' ? '99.9% Premium' : '99.5% Standard'; }
function payPeriodText(){
  switch(state.payTerms){
    case 'prepaid': return 'Prepaid - all fees for the Subscription Period are due in advance on or before the Subscription Start Date.';
    case 'net15':   return 'Net 15 - payment due within fifteen (15) days of Customer’s receipt of each invoice.';
    default:        return 'Net 30 - payment due within thirty (30) days of Customer’s receipt of each invoice.';
  }
}
function money(n){ return '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function marginPctOf(sale,cost){ return (sale!==null&&cost!==null&&sale>0) ? (sale-cost)/sale*100 : null; }
/* admin-only: returns a blocking message if the current margin is below floor */
function marginBlocker(){
  if(!ADMIN) return null;
  const sale=num(adminState.salePrice), cost=num(adminState.costPerGpu), floor=num(adminState.floor);
  const m=marginPctOf(sale,cost);
  if(floor===null||m===null) return null;
  return m<floor ? `Gross margin ${m.toFixed(1)}% is below the ${floor}% floor` : null;
}
function useSuggestedPrice(p){
  adminState.salePrice=String(p); saveAdmin();
  const si=document.getElementById('saleInput'); if(si) si.value=adminState.salePrice;
  updateAdminCalc();
}
/* live margin readout - admin only; writes into #adminCalc */
function updateAdminCalc(){
  if(!ADMIN) return;
  const el=document.getElementById('adminCalc'); if(!el) return;
  const sale=num(adminState.salePrice), cost=num(adminState.costPerGpu);
  const floor=num(adminState.floor), target=num(adminState.targetMargin);
  const gpus=totalGpus(), months=parseInt(state.subPeriod,10);
  let pre='';
  if(target!==null && target>=0 && target<100 && cost!==null){   // reverse pricing
    const suggested=cost/(1-target/100);
    pre+=`<div class="row"><span>Suggested price for ${target}% margin</span><span class="v">${money(suggested)} <button class="mini" onclick="useSuggestedPrice(${suggested.toFixed(4)})">use</button></span></div>`;
  }
  if(sale===null||cost===null){
    el.innerHTML=`<div class="calc">${pre}<div class="hint">Enter sale price and cost to compute margin.</div></div>`;
    return;
  }
  const perHr=sale-cost, cls=perHr>=0?'pos':'neg';
  const m=marginPctOf(sale,cost), below=(floor!==null&&m!==null&&m<floor);
  let marginRow='';
  if(m!==null){
    marginRow=`<div class="row ${below?'neg':'pos'}"><span>Gross margin${floor!==null?` (floor ${floor}%)`:''}</span><span class="v">${m.toFixed(1)}%${below?' &#9888; BELOW FLOOR':''}</span></div>`;
  }
  let tcv='';
  if(gpus && !isNaN(months) && months>0){
    tcv=`<div class="row big ${cls}"><span>TCV (${months} mo)</span><span class="v">${money(sale*BILLING_HOURS*gpus*months)}</span></div>
      <div class="row ${cls}"><span>Gross margin (${months} mo)</span><span class="v">${money(perHr*BILLING_HOURS*gpus*months)}</span></div>`;
  }
  el.innerHTML=`<div class="calc">
    ${pre}${marginRow}
    <div class="row ${cls}"><span>Net profit / GPU-hour</span><span class="v">${money(perHr)}</span></div>
    <div class="row ${cls}"><span>Net profit / GPU / month (${BILLING_HOURS}h)</span><span class="v">${money(perHr*BILLING_HOURS)}</span></div>
    <div class="row big ${cls}"><span>Net monthly margin (${gpus.toLocaleString()} GPUs)</span><span class="v">${money(perHr*BILLING_HOURS*gpus)}</span></div>
    ${tcv}
  </div>`;
}

/* ============ READINESS (public) ============ */
function isPlaceholder(s){ return !s || !String(s).trim() || /\[[^\]]*\]/.test(String(s)); }
function runReadiness(){
  const errors=[], warnings=[], nonStandard=[];
  if(isPlaceholder(state.customerName)) errors.push('Customer legal name not filled');
  if(!(parseInt(state.nodeCount,10)>0))  errors.push('Number of nodes not set');
  if(isPlaceholder(state.fee))           errors.push('Cloud Service Fee not filled');
  if(isPlaceholder(state.startDate))     errors.push('Subscription Start Date not set');
  if(isPlaceholder(state.subPeriod))     errors.push('Subscription Period not set');
  if(isPlaceholder(state.effDate))       warnings.push('Effective Date is a placeholder');
  if(isPlaceholder(state.customerAddr))  warnings.push('Customer notice address is empty');
  if(!state.provSigner||!state.provSigner.trim()) warnings.push('io.net signer name is empty');
  if(state.pocMode==='paid' && isPlaceholder(state.pocFee)) warnings.push('Paid POC fee not set');
  Object.keys(LEGAL_LABELS).forEach(k=>{ if(state[k]!==STANDARD[k]) nonStandard.push(LEGAL_LABELS[k]); });
  return {errors,warnings,nonStandard};
}
function updateReadiness(){
  const el=document.getElementById('readiness'); if(!el) return;
  const r=runReadiness();
  const cls=r.errors.length?'err':((r.warnings.length||r.nonStandard.length)?'warn':'ok');
  const head=r.errors.length?'&#10007; Not ready to send'
    :((r.warnings.length||r.nonStandard.length)?'&#9888; Review before sending':'&#10003; Ready to send');
  let h=`<h4>${head}</h4>`;
  if(r.errors.length) h+='<ul>'+r.errors.map(e=>`<li class="err-i">${esc(e)}</li>`).join('')+'</ul>';
  if(r.nonStandard.length) h+=`<div class="rsub">Non-standard terms (flagged for legal review):</div><ul>`+r.nonStandard.map(n=>`<li class="ns-i">${esc(n)}</li>`).join('')+'</ul>';
  if(r.warnings.length) h+=`<div class="rsub">Warnings:</div><ul>`+r.warnings.map(w=>`<li class="warn-i">${esc(w)}</li>`).join('')+'</ul>';
  el.className='readystrip '+cls; el.innerHTML=h;
}

/* ============ SESSION INSURANCE (localStorage autosave) ============ */
function saveDraft(){ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); }catch(e){} }
function hasDraft(){ try{ return !!localStorage.getItem(DRAFT_KEY); }catch(e){ return false; } }
function restoreDraft(){
  try{
    const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}');
    Object.keys(d).forEach(k=>{ state[k]=d[k]; });
  }catch(e){}
  hideToast(); buildForm(); render();
}
/* admin draft kept under a separate key, only ever touched in Admin Mode */
function saveAdmin(){ if(!ADMIN) return; try{ localStorage.setItem(ADMIN_KEY, JSON.stringify(adminState)); }catch(e){} }
function loadAdmin(){ if(!ADMIN) return; try{ const a=JSON.parse(localStorage.getItem(ADMIN_KEY)||'{}'); Object.keys(a).forEach(k=>{ if(k in adminState) adminState[k]=a[k]; }); }catch(e){} }

/* ============ TOAST ============ */
function showToast(html){ const t=document.getElementById('toast'); if(!t) return; t.innerHTML=html; t.classList.remove('hidden'); }
function hideToast(){ const t=document.getElementById('toast'); if(t) t.classList.add('hidden'); }
function flashToast(msg){ showToast(`<span>${esc(msg)}</span><button class="btn-ghost" onclick="hideToast()">OK</button>`); setTimeout(hideToast, 5000); }
function maybeOfferRestore(){
  if(!hasDraft()) return;
  showToast(`<span>A saved draft from a previous session was found.</span>
    <button class="btn-primary" onclick="restoreDraft()">Restore draft</button>
    <button class="btn-ghost" onclick="hideToast()">Dismiss</button>`);
}

/* ============ INTEGRATION HOOK (Send for Signature) ============ */
/* buildSignaturePayload returns ONLY public contract data - it deliberately
   omits adminState (cost/margin). postToWebhook is the modular seam for the
   future n8n -> DocuSign integration. */
function buildSignaturePayload(){
  return {
    generatedAt: new Date().toISOString(),
    document: { title: state.docTitle, deal: state.dealName },
    customer: { name: state.customerName, notice: state.customerAddr },
    provider: { name: state.providerName, signer: state.provSigner, signerTitle: state.provSignerTitle },
    term: { start: state.startDate, period: state.subPeriod, nonRenewalNotice: state.nonRenewal, useLimitations: state.useLimit },
    hardware: { nodes: state.nodeCount, gpusPerNode: GPUS_PER_NODE, totalGpus: totalGpus(), spec: state.specRows },
    commercial: { fee: state.fee, billingHours: BILLING_HOURS, paymentTerms: state.payTerms, paymentPeriod: payPeriodText(), invoicePeriod: state.invPeriod },
    sla: { tier: state.slaTier, availabilityTarget: state.availTarget, creditCap: state.creditCap, monthlyCreditCap: state.monthlyCap, support: state.prios },
    legal: { effectiveDate: state.effDate, governingLaw: state.govLaw, chosenCourts: state.courts, publicity: state.publicity },
    poc: state.pocMode==='none' ? null : { mode: state.pocMode, hours: state.pocHours, fee: state.pocFee },
    review: (function(){ const r=runReadiness(); return { nonStandardTerms: r.nonStandard, openWarnings: r.warnings }; })()
  };
}
const WEBHOOK_URL = ""; // set to the n8n webhook URL to enable live sending
function postToWebhook(payload){
  if(WEBHOOK_URL){
    return fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }
  // placeholder until the webhook is connected
  console.log('[CSA] Send for Signature payload (webhook placeholder):', payload);
  return Promise.resolve();
}
function sendForSignature(){
  const r = runReadiness();
  const blockers = r.errors.slice();
  const mb = marginBlocker(); if(mb) blockers.push(mb);   // admin-only margin floor
  if(blockers.length){
    flashToast('Cannot send - fix first: ' + blockers.join('; '));
    return;
  }
  const payload = buildSignaturePayload();
  postToWebhook(payload);
  const ns = r.nonStandard.length ? ` - ${r.nonStandard.length} non-standard term(s) flagged for legal` : '';
  flashToast(`Signature payload logged to console (${(payload.hardware.totalGpus||0).toLocaleString()} GPUs)${ns}. Webhook integration pending.`);
}

<h2>Exhibit A: Service Availability, Downtime, and Credits</h2>
<div class="legalsec" style="counter-reset:sec"><h3>Definition of Downtime</h3>
  <div class="cl nonum"><span class="clt"></span>For the purposes of these Terms, "Downtime" means (a) a total loss of network connectivity to the server or (b) a partial or total failure of server hardware (including failure of one or more GPUs, storage devices, network adapters, or other critical components) that renders the Service inaccessible or materially prevents access to the server or use of the provisioned resources as allocated, as measured and verified under the Verification &amp; Reporting section below.</div>
  <div class="cl nonum"><span class="clt"></span>Downtime does not include partial hardware failures or other conditions that do not prevent access to the server or use of the provisioned resources. However, Downtime includes any thermal throttling, cooling failure, power limit, BIOS/firmware misconfiguration, or other Provider infrastructure condition to the extent it (a) renders the Service inaccessible, (b) materially prevents use of the provisioned resources, or (c) causes a Material Performance Degradation Event.</div>
  <div class="cl nonum"><span class="clt"></span><b>"Material Performance Degradation Event"</b> means a sustained, verifiable reduction in GPU and/or interconnect performance caused by Provider infrastructure (including thermal, cooling, power, GPU health, or network/interconnect conditions) that has a material adverse effect on Customer's reasonable use of the provisioned resources for their intended purpose, as determined through the parties' joint verification process based on the totality of the circumstances (including the nature of the workload, historical/baseline performance, and whether the condition is more than transient or intermittent).</div>
  <div class="cl nonum"><span class="clt"></span><b>"Covered Downtime"</b> means verified Downtime that is directly caused by failures of the Provider's hardware and/or network infrastructure or Provider-controlled configuration of the environment.</div>
  <div class="cl nonum"><span class="clt"></span>The following are excluded from uptime calculations ("Excluded Downtime"): scheduled maintenance with 7 days' prior notice; emergency maintenance by the Provider; outages under 60 seconds; issues caused by Client equipment or actions; force majeure events; and outages of third-party networks or services outside the Provider's control.</div>
</div>
<div class="legalsec"><h3>Responsibility Allocation</h3>
  <div class="cl nonum"><span class="clt"></span><b>Provider is responsible for:</b> hardware faults, thermal throttling, cooling failures, power limits, or BIOS misconfiguration (in each case, to the extent causing Covered Downtime).</div>
  <div class="cl nonum"><span class="clt"></span><b>Customer is responsible for:</b> low utilization, inefficient model/kernel design, poor batch sizing, bad framework tuning, or CPU/storage/network bottlenecks starving the GPU.</div>
  <div class="cl nonum"><span class="clt"></span>As a condition to any SLA investigation and/or service credit request, Customer will provide reasonable benchmark evidence and relevant logs/telemetry showing the reported issue, including timestamps, node identifiers, and workload context.</div>
</div>
<div class="legalsec"><h3>Credited Downtime</h3>
  <div class="cl nonum"><span class="clt"></span>Customer may be eligible to receive service credits for verified Downtime that is directly caused by failures of the Company's hardware and/or network infrastructure ("Covered Downtime"). Any service credits issued shall be calculated in accordance with the Company's then-current credit policy and shall constitute the Customer's sole and exclusive remedy for Covered Downtime.</div>
  <div class="cl nonum"><span class="clt"></span><b>Monthly Credit Cap.</b> Where the Order Form SLA provides that the maximum cumulative credit in any month shall not exceed a stated percentage of that month's recurring charge, the maximum cumulative service credit earned for SLA events occurring in any Service Month will not exceed that percentage of that Service Month's recurring charge for the affected Service (the "Monthly Credit Cap"), regardless of when the credit is applied (including through any mid-term billing adjustment or end-of-term true-up).</div>
  <div class="cl nonum"><span class="clt"></span><b>Limitation of Credits.</b> Service credits are non-transferable, not redeemable for cash, and shall not exceed the fees paid by the Customer for the affected service during the applicable billing period. Credits will be applied to the next invoice(s) unless the parties agree otherwise in writing. Customer must be current on payment obligations to be eligible to receive credits. Notwithstanding the foregoing, credits will not lapse unused solely due to expiration or termination to the extent Customer's payment structure includes prepaid amounts (including any down payment) and there are insufficient future invoices against which to apply earned credits. In that case, the parties will apply credits through the review/true-up process below.</div>
  <div class="cl nonum"><span class="clt"></span><b>Mid-Term Billing Review.</b> Within 10 business days after the end of the 8th month of the Term, the parties will review in good faith any pending or accrued SLA events and credit amounts. Any verified credits as of that date will be applied as an adjustment to the 8th month invoice and/or subsequent invoice(s).</div>
  <div class="cl nonum"><span class="clt"></span><b>End-of-Term Review.</b> Within 30 days after expiration or termination, the parties will complete a final review of SLA events occurring prior to the effective date of expiration/termination and determine any remaining credits owed. Any remaining verified credits will be applied (in order) to: (i) outstanding amounts owed by Customer; (ii) any future invoice(s) if services continue under a renewal or replacement order; and then (iii) prepaid but unused amounts paid by Customer for the affected Service (including any down payment), via invoice adjustment/credit note and refund of the net prepaid balance to the extent necessary to give effect to the credits.</div>
</div>
<div class="legalsec"><h3>Excluded Downtime</h3>
  <div class="cl nonum"><span class="clt"></span>The following shall not be considered Covered Downtime and shall not be eligible for service credits:
    <ul class="dash">
      <li><b>Emergency Maintenance:</b> Downtime arising from emergency or unscheduled maintenance required to address security vulnerabilities, stability issues, firmware updates, hardware replacement, or other urgent operational needs, whether or not advance notice is provided.</li>
      <li><b>Customer-Caused Issues:</b> Downtime caused by Customer actions or configurations, including misconfigurations, improper system administration, software errors, broken or misbehaving services, unsupported modifications, or violations of these Terms.</li>
      <li><b>GPU Software Stack and Driver Issues:</b> Failures or interruptions related to operating systems, GPU drivers, CUDA, ROCm, firmware, container runtimes, orchestration platforms, or other software components not directly caused by the Company's underlying hardware.</li>
      <li><b>Customer Workloads:</b> Downtime resulting from Customer workloads, including GPU resets, kernel panics, resource exhaustion, watchdog timeouts, or similar workload-induced conditions.</li>
      <li><b>Distributed or Multi-Node Workloads:</b> Failures related to distributed training, multi-node synchronization, inter-process communication, or workload orchestration, unless directly caused by a verified failure of the Company's network infrastructure.</li>
      <li><b>Third-Party Factors:</b> Downtime caused by third-party software, services, networks, or dependencies not under the Company's direct control.</li>
    </ul>
    The data centre SLA excludes GPU software stack/driver issues and distributed or multi-node workload failures unless classified as verified network failures. However, the Data Centre will adhere to SLA commitments for any infrastructure-level, GPU-level, or network-level issues, and will run HPL and NCCL tests to ensure cluster stability, interconnect performance, and efficient multi-node communication, thereby validating that the environment is production-ready before it is handed over to the Customer.</div>
</div>
<div class="legalsec"><h3>Verification &amp; Reporting</h3>
  <div class="cl nonum"><span class="clt"></span>All Downtime and service credit claims must be submitted within a reasonable time after the event and are subject to verification by the Provider. All SLA events shall be subject to a joint verification process between the parties. Each party shall be entitled to utilize its own monitoring systems, benchmarking tools, and collected performance data as part of this verification. Any determination of an SLA event, including its validity and impact, shall be mutually reviewed and agreed upon in good faith based on the available data from both parties.</div>
  <div class="cl nonum"><span class="clt"></span>The parties will use the following joint verification process (the "Joint Verification Process") for any alleged SLA event (including Covered Downtime and Material Performance Degradation Events):
    <ul class="dash">
      <li><b>Notice.</b> Customer will notify Provider with reasonably detailed information (including timestamps, impacted nodes, symptoms, and any available logs/metrics).</li>
      <li><b>Data sharing.</b> Each party will share relevant monitoring and benchmarking data reasonably necessary to assess the event, including Provider-side infrastructure telemetry and Customer-side application/workload metrics, subject to reasonable confidentiality and security requirements.</li>
      <li><b>Good-faith determination.</b> The parties will make a good-faith determination of the existence, cause, and duration of the SLA event based on the evidence, including both parties' monitoring/benchmark data.</li>
      <li><b>Escalation.</b> If the parties' technical representatives cannot agree within 5 business days after the joint review meeting, the dispute will be escalated to each party's designated manager for resolution in good faith.</li>
      <li><b>Deadlock.</b> If the parties still cannot agree within 10 business days after escalation, the dispute will be handled under the dispute resolution provisions of the Terms.</li>
    </ul></div>
